<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>로또 번호 추첨기 (6/45)</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="container">
    <header class="header">
      <h1>로또 번호 추첨기</h1>
      <p>6/45 규칙으로 중복 없는 번호 6개를 생성합니다.</p>
    </header>

    <section class="card controls">
      <div class="field-group">
        <label for="setCount">세트 수</label>
        <select id="setCount">
          <option value="1">1세트</option>
          <option value="3" selected>3세트</option>
          <option value="5">5세트</option>
          <option value="10">10세트</option>
        </select>
      </div>

      <div class="field-group">
        <label for="seed">시드(선택)</label>
        <input id="seed" type="text" placeholder="예: 20260305" />
      </div>

      <div class="button-row">
        <button id="generateBtn" class="btn primary">번호 생성</button>
        <button id="copyBtn" class="btn">결과 복사</button>
        <button id="clearBtn" class="btn danger">기록 삭제</button>
      </div>
    </section>

    <section class="card">
      <div class="section-head">
        <h2>생성 결과</h2>
      </div>
      <div id="result" class="result"></div>
    </section>

    <section class="card">
      <div class="section-head">
        <h2>최근 기록</h2>
        <span id="historyCount" class="muted">0개</span>
      </div>
      <ul id="history" class="history"></ul>
    </section>
  </main>

  <div id="toast" class="toast" aria-live="polite"></div>

  <script src="script.js"></script>
</body>
</html>
